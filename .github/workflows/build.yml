name: Build and Release PhotoOrg

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore gui/PhotoOrgApp/PhotoOrgApp.csproj

      - name: Build Windows EXE
        run: >
          dotnet publish gui/PhotoOrgApp/PhotoOrgApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:AssemblyName=PhotoOrg
          -f net10.0
          -o dist/

      - name: List dist folder
        run: dir dist
        shell: cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PhotoOrg ${{ github.ref_name }}
          body: |
            ## PhotoOrg ${{ github.ref_name }}

            Automatic photo and video organiser for Windows.

            ### How to install
            1. Download PhotoOrg.exe below
            2. Double click to run
            3. No installation needed

            ### Requirements
            - Windows 10 or Windows 11
          files: dist/PhotoOrg.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}